<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szafqu | Bio Link</title>
    <link rel="icon" type="image/png" href="media/avataro.png">    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ZMIENNE KOLORYSTYCZNE */
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #a855f7; /* Fioletowy akcent */
            
            /* Statusy Discorda */
            --online: #43b581;
            --idle: #faa61a;
            --dnd: #f04747;
            --offline: #747f8d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* EKRAN WEJŚCIOWY */
        #entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .click-text {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* TŁO WIDEO */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            opacity: 0.3;
            filter: grayscale(0.2) blur(2px);
            transition: filter 1s ease;
        }

        body.loaded .video-background {
            filter: grayscale(0.2) blur(0px);
        }

        /* KARTA LIQUID GLASS */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.loaded .glass-card {
            opacity: 1;
            transform: scale(1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-20deg);
            transition: 0.7s;
            pointer-events: none;
        }
        .glass-card:hover::before {
            left: 150%;
            transition: 0.7s ease-in-out;
        }

        /* ANIMACJE ELEMENTÓW W KARDZIE */
        .animate-item {
            opacity: 0;
            transform: translateY(20px);
        }
        
        body.loaded .animate-item {
            animation: fadeInUp 0.6s forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }

        /* ZDJĘCIE PROFILOWE */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .profile-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .username {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .bio {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        /* WIDŻET DISCORD */
        .discord-widget {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
            transition: background 0.3s ease;
        }
        .discord-widget:hover {
            background: rgba(0, 0, 0, 0.6);
        }

        .discord-avatar-wrapper { position: relative; }
        .discord-avatar { width: 50px; height: 50px; border-radius: 50%; background: #2f3136; }
        .status-dot {
            position: absolute; bottom: 0; right: 0;
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid #0f0f13;
            background-color: var(--offline);
        }

        .discord-info { flex: 1; }
        .discord-name { font-size: 0.95rem; font-weight: 600; color: #fff; display: block; }
        .discord-activity { font-size: 0.8rem; color: #b9bbbe; display: block; margin-top: 2px; }

        /* KRYPTO ADRESY */
        .crypto-section { display: flex; flex-direction: column; gap: 12px; }
        
        .crypto-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
        }
        .crypto-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-color: var(--accent-color);
        }

        .crypto-btn span {
            display: flex;
            align-items: center;
        }

        .crypto-btn .brand-btc {
            color: var(--accent-color);
            margin-right: 8px;
            font-size: 1.1rem;
        }

        .crypto-btn .brand-eth {
            color: var(--accent-color);
            margin-right: 10px;
            font-size: 1.1rem;
        }        

        .crypto-btn svg.brand-ltc {
            width: 1.15rem;
            height: 1.15rem;
            fill: var(--accent-color);
            margin-right: 3px; 
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-color); color: white;
            padding: 10px 25px; border-radius: 30px;
            font-weight: 600; font-size: 0.85rem;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    </style>
</head>
<body>

    <div id="entry-overlay">
        <div class="click-text">Click to enter</div>
    </div>

    <video loop muted playsinline class="video-background" id="bg-video">
        <source src="media/wideo.webm" type="video/webm">
    </video>

    <audio id="bg-audio" loop>
        <source src="media/audio.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card">
        
        <img src="media/avatark.jpg" alt="Profile" class="profile-img animate-item delay-1">
        
        <div class="animate-item delay-2">
            <h1 class="username">SZAFQU</h1>
            <p class="bio">I Like Money And Nicotine</p>
        </div>

        <div class="discord-widget animate-item delay-3">
            <div class="discord-avatar-wrapper">
                <img src="" alt="" class="discord-avatar" id="dc-avatar">
                <div class="status-dot" id="dc-status"></div>
            </div>
            <div class="discord-info">
                <span class="discord-name" id="dc-name">Discord</span>
                <span class="discord-activity" id="dc-activity">Ładowanie statusu...</span>
            </div>
        </div>

        <div class="crypto-section animate-item delay-4">
            <div class="crypto-btn" onclick="copyCrypto('BTC', 'bc1qlnfsp45mg79gh3jjwmjepm77gtc6rhzjvp7p2s')">
                <span><i class="fa-brands fa-btc brand-btc"></i> Bitcoin</span>
                <i class="fa-regular fa-copy"></i>
            </div>
            <div class="crypto-btn" onclick="copyCrypto('ETH', '0x02f042F66a8d01D294D85962cfB081e9a589537B')">
                <span><i class="fa-brands fa-ethereum brand-eth"></i> Ethereum</span>
                <i class="fa-regular fa-copy"></i>
            </div>
            <div class="crypto-btn" onclick="copyCrypto('LTC', 'LSE93LuwswntAj5qHeL1T54mBcfaXSdSuM')">
                <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" class="brand-ltc"><g><path d="m56.46 91.39 7.11-24.29 10.8-3.49 2.6-9.17-10.71 3.46 12.32-42.13H59.14l-14.7 49.18-11.79 3.8-2.6 9.17 11.64-3.76-10.19 34.07h61.24l5.21-16.84z" fill="#a855f7"></path></g></svg> Litecoin</span>
                <i class="fa-regular fa-copy"></i>
            </div>
        </div>

        </div>

    <div id="toast">Copied!</div>

    <script>
        const DISCORD_ID = "1296100866377383976";

        const overlay = document.getElementById('entry-overlay');
        const audio = document.getElementById('bg-audio');
        const video = document.getElementById('bg-video');

        overlay.addEventListener('click', () => {
            overlay.classList.add('hidden');
            document.body.classList.add('loaded');
            audio.volume = 1,0;
            audio.play().catch(e => console.log("Audio block"));
            video.play().catch(e => console.log("Video block"));
        });

        function copyCrypto(coinName, address) {
            const tempInput = document.createElement("input");
            tempInput.value = address;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            showToast(`${coinName} address copied!`);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        async function fetchDiscordData() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const data = await response.json();

                if (data.success) {
                    const d = data.data;
                    document.getElementById('dc-name').innerText = d.discord_user.global_name || d.discord_user.username;
                    document.getElementById('dc-avatar').src = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png`;
                    
                    const statusDot = document.getElementById('dc-status');
                    const colors = {
                        online: 'var(--online)', idle: 'var(--idle)',
                        dnd: 'var(--dnd)', offline: 'var(--offline)'
                    };
                    statusDot.style.backgroundColor = colors[d.discord_status];

                    const activityElement = document.getElementById('dc-activity');
                    if (d.listening_to_spotify) {
                        activityElement.innerHTML = `<i class="fa-brands fa-spotify" style="color: #1DB954;"></i> Listening: ${d.spotify.song}`;
                    } 
                    else if (d.activities.length > 0) {
                        const game = d.activities.find(x => x.type === 0);
                        if (game) {
                            activityElement.innerText = `Playing: ${game.name}`;
                        } else {
                            const customStatus = d.activities.find(x => x.type === 4);
                            if (customStatus && customStatus.state) {
                                activityElement.innerText = customStatus.state;
                            } else {
                                activityElement.innerText = d.discord_status.toUpperCase();
                            }
                        }
                    } else {
                        activityElement.innerText = d.discord_status.toUpperCase();
                    }
                }
            } catch (error) {
                console.error("Lanyard API error", error);
                document.getElementById('dc-activity').innerText = "Offline";
            }
        }

        fetchDiscordData();
        setInterval(fetchDiscordData, 15000);
    </script>
</body>
</html>
